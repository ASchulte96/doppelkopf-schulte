
<title>DoppelKopf Schulte</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#174D22">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DK Schulte">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<style>
@keyframes fadeUp  { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn  { from{opacity:0} to{opacity:1} }
@keyframes sheetUp { from{opacity:0;transform:translateY(100%)} to{opacity:1;transform:translateY(0)} }
@keyframes spin    { to{transform:rotate(360deg)} }
@keyframes popIn   { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:      #174D22;
  --s1:      #0C1E10;
  --s2:      #0F2514;
  --s3:      #132C18;
  --s4:      #183820;
  --bd:      rgba(255,255,255,.10);
  --bd-hi:   rgba(255,255,255,.20);
  --gold:    #C9A34A;
  --gold-b:  #E8C870;
  --gold-bg: rgba(201,163,74,.15);
  --gold-bd: rgba(201,163,74,.40);
  --burg:    #6B1520;
  --burg-b:  #8B2035;
  --burg-bg: rgba(107,21,32,.25);
  --burg-bd: rgba(180,40,60,.45);
  --green:   #5DC97C;
  --grn-bg:  rgba(93,201,124,.13);
  --grn-bd:  rgba(93,201,124,.38);
  --red:     #E06060;
  --red-bg:  rgba(224,96,96,.13);
  --red-bd:  rgba(224,96,96,.38);
  --yel:     #E0B020;
  --yel-bg:  rgba(224,176,32,.13);
  --yel-bd:  rgba(224,176,32,.38);
  --t1:      #F5EDD0;
  --t2:      #9ABCA0;
  --t3:      #4E7254;
  --r:  14px;
  --rs: 10px;
}
[data-theme="light"]{
  --bg:      #1E6830;
  --s1:      #163820;
  --s2:      #1A4226;
  --s3:      #1E4E2C;
  --s4:      #246033;
  --bd:      rgba(255,255,255,.14);
  --bd-hi:   rgba(255,255,255,.28);
  --t1:      #FDF6E0;
  --t2:      #B8D4BC;
  --t3:      #6A9870;
}

/* ── SAISONAL ─────────────────────────────────────────── */
/* Frühling (März–Mai): frisches Hellgrün, helles Gold */
[data-season="spring"]{
  --bg:      #1A5828;
  --s1:      #0D2212;
  --s2:      #102815;
  --s3:      #143019;
  --s4:      #1A3C20;
  --gold:    #C8A83C;
  --gold-b:  #E2C058;
  --gold-bg: rgba(200,168,60,.14);
  --gold-bd: rgba(200,168,60,.38);
  --t2:      #9EC4A4;
  --t3:      #52784C;
}
/* Sommer (Juni–Aug): sattteres Grün, leuchtendes Gold */
[data-season="summer"]{
  --bg:      #1D6030;
  --s1:      #0E2614;
  --s2:      #112D17;
  --s3:      #15361C;
  --s4:      #1C4224;
  --gold:    #D4A830;
  --gold-b:  #F0C840;
  --gold-bg: rgba(212,168,48,.14);
  --gold-bd: rgba(212,168,48,.4);
}
/* Herbst (Sep–Nov): Bernstein statt Gold, tiefes Waldgrün */
[data-season="autumn"]{
  --bg:      #1A2810;
  --s1:      #0C160A;
  --s2:      #0F1C0C;
  --s3:      #13220F;
  --s4:      #182C14;
  --gold:    #C07828;
  --gold-b:  #D89040;
  --gold-bg: rgba(192,120,40,.13);
  --gold-bd: rgba(192,120,40,.38);
  --burg:    #7A1210;
  --burg-b:  #9C2018;
  --burg-bg: rgba(122,18,16,.28);
  --burg-bd: rgba(190,45,35,.48);
  --t2:      #98A880;
  --t3:      #5A6845;
}
/* Winter (Dez–Feb): Silber statt Gold, eisiges Dunkelgrün */
[data-season="winter"]{
  --bg:      #0E1E1A;
  --s1:      #060E0C;
  --s2:      #091210;
  --s3:      #0C1814;
  --s4:      #101E19;
  --gold:    #8EAABB;
  --gold-b:  #B0C8D8;
  --gold-bg: rgba(142,170,187,.12);
  --gold-bd: rgba(142,170,187,.32);
  --burg:    #3C1028;
  --burg-b:  #5C1A38;
  --burg-bg: rgba(60,16,40,.28);
  --burg-bd: rgba(100,30,70,.48);
  --t1:      #EAF0F5;
  --t2:      #8AAAB8;
  --t3:      #466070;
}

html,body{height:100%;width:100%;background:var(--bg);color:var(--t1);
  font-family:-apple-system,'Segoe UI',system-ui,sans-serif;font-size:18px;
  line-height:1.5;overflow:hidden;overscroll-behavior:none;
  background-image:
  transition:background-color .3s}

/* ── AUTH ─────────────────────────────────────────────── */
#auth{position:fixed;inset:0;z-index:100;display:flex;align-items:center;
  justify-content:center;padding:20px;background:var(--bg);
  background-image:
  overflow-y:auto}
#auth.gone{display:none}

.aw{width:100%;max-width:380px;animation:fadeUp .4s cubic-bezier(.22,.68,0,1.2) both}
.a-brand{text-align:center;margin-bottom:22px}
.a-emblem{margin:0 auto 0;width:140px;height:90px;display:block}
.a-banner{background:linear-gradient(90deg,var(--burg) 0%,#9B2235 50%,var(--burg) 100%);
  border-top:2px solid var(--gold);border-bottom:2px solid var(--gold);
  padding:10px 20px 8px;margin:0 -4px;text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,.5)}
.a-title{font-size:1.75rem;font-weight:900;letter-spacing:.15em;text-transform:uppercase;
  color:var(--gold);text-shadow:0 1px 8px rgba(0,0,0,.6);font-family:Georgia,serif;line-height:1.1}
.a-sub{font-size:.72rem;letter-spacing:.25em;text-transform:uppercase;
  color:var(--gold-b);opacity:.75;margin-top:3px}

.a-card{background:var(--s1);border:1.5px solid var(--bd-hi);border-radius:18px;
  padding:22px;box-shadow:0 24px 80px rgba(0,0,0,.55)}

.a-tabs{display:flex;gap:4px;background:var(--s3);border-radius:var(--rs);padding:4px;margin-bottom:20px}
.a-tab{flex:1;padding:8px;background:none;border:none;border-radius:8px;
  color:var(--t3);font-size:.92rem;font-weight:600;cursor:pointer;transition:all .18s}
.a-tab.on{background:var(--s1);color:var(--t1);box-shadow:0 1px 5px rgba(0,0,0,.35)}

.fld{margin-bottom:13px}
.fld label{display:block;font-size:.78rem;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.fld-w{position:relative}
.fld input{width:100%;padding:11px 13px;background:var(--s3);border:1.5px solid var(--bd);
  border-radius:var(--rs);color:var(--t1);font-size:1rem;font-family:inherit;
  outline:none;transition:border-color .15s}
.fld input:focus{border-color:var(--gold-bd)}
.fld input::placeholder{color:var(--t3)}
.pw-eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--t3);font-size:.85rem;padding:3px}

.a-err{background:var(--red-bg);border:1.5px solid var(--red-bd);border-radius:8px;
  padding:9px 12px;font-size:.8rem;color:var(--red);margin-bottom:12px;display:none}
.a-err.show{display:block}

.btn-a{width:100%;padding:13px;background:var(--gold);color:var(--bg);border:none;
  border-radius:var(--rs);font-size:.92rem;font-weight:800;cursor:pointer;
  transition:opacity .15s,transform .1s;display:flex;align-items:center;
  justify-content:center;gap:8px;letter-spacing:.02em}
.btn-a:active{transform:scale(.98)}
.btn-a:disabled{opacity:.4;cursor:not-allowed}
.spin{width:15px;height:15px;border-radius:50%;border:2px solid rgba(22,40,17,.3);
  border-top-color:var(--bg);animation:spin .7s linear infinite;display:none}
.loading .spin{display:block}
.loading .a-txt{display:none}

/* ── SHELL ────────────────────────────────────────────── */
#app{position:fixed;inset:0;display:flex;flex-direction:column}
#app[hidden]{display:none}

.topbar{flex-shrink:0;background:linear-gradient(90deg,var(--burg) 0%,#8B1C2C 100%);
  border-bottom:2px solid var(--gold);
  height:54px;padding:0 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;
  box-shadow:0 3px 16px rgba(0,0,0,.5)}
.tb-brand{display:flex;align-items:center;gap:8px}
.tb-icon{width:28px;height:28px;border-radius:8px;background:var(--gold);
  color:var(--bg);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:800}
.tb-name{font-size:.98rem;font-weight:800;letter-spacing:-.02em;color:var(--t1)}
.tb-right{display:flex;align-items:center;gap:6px}

.u-pill{display:flex;align-items:center;gap:7px;background:var(--s2);
  border:1px solid var(--bd-hi);border-radius:30px;padding:4px 11px 4px 5px;
  cursor:pointer;transition:background .15s}
.u-pill:hover{background:var(--s3)}
.u-av{width:24px;height:24px;border-radius:50%;background:var(--gold);color:var(--bg);
  font-size:.72rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.u-nm{font-size:.88rem;font-weight:700;color:var(--t1);max-width:80px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.u-exit{font-size:.72rem;color:var(--t3)}

.admin-btn{width:30px;height:30px;border-radius:8px;background:var(--gold-bg);
  border:1px solid var(--gold-bd);color:var(--gold-b);font-size:.85rem;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background .15s;flex-shrink:0}
.admin-btn:hover{background:rgba(201,163,74,.22)}

.scroll{flex:1;overflow-y:auto;padding:14px 13px 78px}

/* ── TABBAR ───────────────────────────────────────────── */
.tabbar{position:absolute;bottom:0;left:0;right:0;height:66px;
  background:linear-gradient(90deg,var(--burg) 0%,#8B1C2C 100%);
  border-top:2px solid var(--gold);display:flex;align-items:center;padding:0 4px;
  padding-bottom:env(safe-area-inset-bottom,0);box-shadow:0 -3px 16px rgba(0,0,0,.45)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;background:none;border:none;cursor:pointer;color:rgba(245,237,208,.45);
  font-size:.68rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  padding:7px 2px;border-radius:var(--rs);transition:color .18s,background .18s}
.tab.on{color:var(--gold-b);background:rgba(201,163,74,.18)}
.tab svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ── SHARED CARD ──────────────────────────────────────── */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);
  margin-bottom:10px;overflow:hidden;animation:popIn .18s ease both;
  box-shadow:0 4px 20px rgba(0,0,0,.5),0 1px 0 rgba(255,255,255,.06) inset}
.ch{padding:11px 14px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;gap:10px}
.cb{padding:13px 14px}
.cht{font-size:.92rem;font-weight:700;color:var(--gold)}

.badge{display:inline-flex;align-items:center;gap:3px;font-size:.78rem;
  font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.b-next{background:var(--gold-bg);color:var(--gold-b);border:1px solid var(--gold-bd)}
.b-green{background:var(--grn-bg);color:var(--green);border:1px solid var(--grn-bd)}
.b-red  {background:var(--red-bg); color:var(--red);  border:1px solid var(--red-bd)}
.b-yel  {background:var(--yel-bg); color:var(--yel);  border:1px solid var(--yel-bd)}
.b-gold {background:var(--gold-bg);color:var(--gold-b);border:1px solid var(--gold-bd)}

.sec{font-size:.78rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:var(--t3);margin:18px 0 9px}
.sec:first-child{margin-top:0}

/* ── TERMINE ──────────────────────────────────────────── */
.me-bar{display:flex;align-items:center;gap:9px;background:var(--gold-bg);
  border:1px solid var(--gold-bd);border-radius:var(--rs);padding:9px 13px;
  margin-bottom:13px;font-size:.9rem;color:var(--t2)}
.me-bar strong{color:var(--gold-b)}

.t-date{font-size:1.05rem;font-weight:700;color:var(--t1)}
.t-meta{font-size:.85rem;color:var(--t3);margin-top:2px}
.t-by  {font-size:.8rem; color:var(--t3);margin-top:1px}

.tally{display:flex;gap:11px;margin:9px 0}
.tv{display:flex;align-items:center;gap:4px;font-size:.85rem;font-weight:700}
.tv-d{width:7px;height:7px;border-radius:50%}
.tv.ja   .tv-d{background:var(--green)}  .tv.ja   {color:var(--green)}
.tv.may  .tv-d{background:var(--yel)}    .tv.may  {color:var(--yel)}
.tv.nein .tv-d{background:var(--red)}    .tv.nein {color:var(--red)}

.vgrid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:11px}
.vc{padding:4px 10px;border-radius:20px;font-size:.82rem;font-weight:600;
  background:var(--s2);color:var(--t3);border:1px solid var(--bd)}
.vc.ja  {background:var(--grn-bg);color:var(--green);border-color:var(--grn-bd)}
.vc.may {background:var(--yel-bg);color:var(--yel);  border-color:var(--yel-bd)}
.vc.nein{background:var(--red-bg);color:var(--red);  border-color:var(--red-bd)}
.vc.me  {box-shadow:0 0 0 1.5px var(--gold)}

.vrow{display:flex;gap:6px}
.vb{flex:1;padding:11px 5px;border-radius:var(--rs);border:1.5px solid var(--bd);
  background:var(--s2);color:var(--t3);font-size:.88rem;font-weight:700;
  cursor:pointer;text-align:center;transition:all .15s}
.vb.ja  {border-color:var(--grn-bd);background:var(--grn-bg);color:var(--green)}
.vb.may {border-color:var(--yel-bd);background:var(--yel-bg);color:var(--yel)}
.vb.nein{border-color:var(--red-bd);background:var(--red-bg);color:var(--red)}

/* side-by-side voting area */
.t-side{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start}
.t-side .vgrid{align-content:start}
.t-side .vrow{display:flex;flex-direction:column;gap:5px;min-width:115px}
.t-side .vrow .vb{padding:10px 6px;font-size:.85rem}

/* ── STRAFENKASSE ─────────────────────────────────────── */
.straf-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);
  margin-bottom:13px;overflow:hidden}
.straf-head{background:rgba(0,0,0,.18);padding:11px 14px;display:flex;
  align-items:center;justify-content:space-between}
.straf-title{font-size:.95rem;font-weight:700;color:var(--gold);
  display:flex;align-items:center;gap:7px}
.straf-sum{font-size:.82rem;color:var(--t3)}
.straf-row{display:flex;align-items:center;gap:10px;padding:10px 14px;
  border-top:1px solid var(--bd)}
.straf-av{width:30px;height:30px;border-radius:50%;background:var(--s3);
  color:var(--t2);font-size:.75rem;font-weight:800;display:flex;
  align-items:center;justify-content:center;flex-shrink:0}
.straf-name{flex:1;font-size:.92rem;font-weight:600}
.straf-amt{font-size:.95rem;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}
.straf-amt.has{color:var(--yel)}
.straf-amt.zero{color:var(--t3)}
.btn-plus{width:26px;height:26px;border-radius:50%;background:var(--s3);
  border:1px solid var(--bd-hi);color:var(--t2);font-size:1rem;line-height:1;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .15s;flex-shrink:0}
.btn-plus:hover{background:var(--gold-bg);color:var(--gold-b);border-color:var(--gold-bd)}

/* ── FAB ──────────────────────────────────────────────── */
.fab{position:fixed;bottom:78px;right:15px;width:48px;height:48px;border-radius:50%;
  background:var(--gold);color:var(--bg);border:none;font-size:1.4rem;cursor:pointer;
  box-shadow:0 5px 20px rgba(201,163,74,.4);display:flex;align-items:center;
  justify-content:center;z-index:10;transition:transform .15s}
.fab:active{transform:scale(.9)}
.fab[hidden]{display:none}

/* ── REGELN ───────────────────────────────────────────── */
.rg-group{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);
  margin-bottom:10px;overflow:hidden;animation:popIn .18s ease both}
.rg-grp-head{background:rgba(0,0,0,.22);padding:11px 14px;
  display:flex;align-items:center;gap:8px}
.rg-grp-name{font-size:1rem;font-weight:800;color:var(--gold);flex:1;letter-spacing:-.01em}
.rg-grp-count{font-size:.78rem;color:var(--t3);white-space:nowrap}
.rg-act{background:none;border:1px solid var(--bd);border-radius:6px;color:var(--t3);
  font-size:.85rem;padding:4px 10px;cursor:pointer;transition:all .14s;line-height:1.4;white-space:nowrap}
.rg-act:hover{border-color:var(--gold-bd);color:var(--gold-b)}
.rg-row{padding:11px 14px;border-top:1px solid var(--bd);
  display:flex;align-items:center;gap:10px}
.rg-txt{font-size:.92rem;flex:1;line-height:1.5}
.rg-straf{font-size:.95rem;font-weight:800;color:var(--gold);white-space:nowrap}

/* ── KASSE ────────────────────────────────────────────── */
.k-hero{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);
  padding:20px 18px;text-align:center;margin-bottom:12px;position:relative;overflow:hidden}
.k-hero::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at top,rgba(201,163,74,.07),transparent)}
.k-lbl{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.11em;
  color:var(--t3);margin-bottom:7px}
.k-amt{font-size:2.8rem;font-weight:800;letter-spacing:-.04em;
  font-variant-numeric:tabular-nums;line-height:1}
.k-amt.pos{color:var(--green)} .k-amt.neg{color:var(--red)} .k-amt.z{color:var(--t3)}
.k-sub{font-size:.75rem;color:var(--t3);margin-top:7px}
.b-row{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rs);
  padding:10px 13px;margin-bottom:6px;display:flex;align-items:center;gap:11px}
.b-date{font-size:.72rem;color:var(--t3);min-width:62px;flex-shrink:0}
.b-info{flex:1;min-width:0}
.b-desc{font-size:.86rem;font-weight:500}
.b-by  {font-size:.7rem;color:var(--t3)}
.b-amt {font-size:.92rem;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap}
.b-amt.pos{color:var(--green)} .b-amt.neg{color:var(--red)}

/* ── STATISTIK ────────────────────────────────────────── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.stat-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);
  overflow:hidden;animation:popIn .18s ease both}
.stat-card.wide{grid-column:1/-1}
.stat-head{background:rgba(0,0,0,.18);padding:10px 13px;font-size:.78rem;
  font-weight:700;color:var(--gold);display:flex;align-items:center;gap:6px}
.stat-row{display:flex;align-items:center;gap:9px;padding:8px 13px;
  border-top:1px solid var(--bd)}
.stat-med{font-size:1rem;min-width:22px;text-align:center}
.stat-nm{flex:1;font-size:.83rem;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat-val{font-size:.85rem;font-weight:800;color:var(--gold-b);
  font-variant-numeric:tabular-nums;white-space:nowrap}
.stat-val.red{color:var(--red)}
.stat-empty{padding:14px 13px;font-size:.78rem;color:var(--t3);text-align:center}

/* ── EVENTS ───────────────────────────────────────────── */
.ev{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);
  overflow:hidden;margin-bottom:10px;animation:popIn .18s ease both}
.ev-stripe{height:3px;background:linear-gradient(90deg,var(--gold),var(--gold-b));opacity:.7}
.ev-body{padding:14px}
.ev-date{font-size:.7rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:var(--gold);margin-bottom:4px}
.ev-title{font-size:1rem;font-weight:800;letter-spacing:-.01em;margin-bottom:5px}
.ev-desc{font-size:.83rem;color:var(--t2);line-height:1.5}
.ev-ort{font-size:.73rem;color:var(--t3);margin-top:9px;display:flex;align-items:center;gap:4px}
.ev-by {font-size:.7rem;color:var(--t3);margin-top:7px;padding-top:7px;border-top:1px solid var(--bd)}

<script>
// ══ CLOUD SYNC ═══════════════════════════════════════════
const FB_URL='https://doppelkopf-schulte-default-rtdb.europe-west1.firebasedatabase.app/db.json';
const FB_BASE='https://doppelkopf-schulte-default-rtdb.europe-west1.firebasedatabase.app';
let syncTimer=null, syncing=false;

// ── Presence (Online-Indikator) ──────────────────────────
let _presTimer=null;
async function presencePing(){
  if(!ME)return;
  try{await fetch(`${FB_BASE}/presence/${encodeURIComponent(ME)}.json`,{
    method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ts:Date.now(),name:ME})
  });}catch(e){}
}
async function presenceRead(){
  try{
    const r=await fetch(`${FB_BASE}/presence.json`);
    if(!r.ok)return;
    const raw=await r.json();
    if(!raw||typeof raw!=='object')return;
    const now=Date.now();
    const online=Object.values(raw).filter(v=>v&&(now-(v.ts||0))<90000);
    const badge=document.getElementById('online-badge');
    const cnt=document.getElementById('online-count');
    if(badge&&cnt){
      cnt.textContent=online.length;
      badge.style.display=online.length>0?'flex':'none';
      badge.title=online.map(v=>v.name).join(', ')+' online';
    }
  }catch(e){}
}
function startPresence(){
  presencePing(); presenceRead();
  _presTimer=setInterval(()=>{presencePing();presenceRead();},30000);
}
function stopPresence(){
  clearInterval(_presTimer);
  if(!ME)return;
  try{fetch(`${FB_BASE}/presence/${encodeURIComponent(ME)}.json`,{method:'DELETE'});}catch(e){}
}
window.addEventListener('beforeunload',stopPresence);

// ── Admin-Panel Schreibschutz ────────────────────────────
let _adminLockOwner=false;
async function acquireAdminLock(){
  try{
    const r=await fetch(`${FB_BASE}/locks/adminPanel.json`);
    const lock=r.ok?await r.json():null;
    if(lock&&lock.user&&lock.user!==ME&&(Date.now()-(lock.ts||0))<30000){
      return{ok:false,by:lock.user};
    }
    await fetch(`${FB_BASE}/locks/adminPanel.json`,{
      method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({user:ME,ts:Date.now()})
    });
    _adminLockOwner=true;
    return{ok:true};
  }catch(e){return{ok:true};}
}
function releaseAdminLock(){
  if(!_adminLockOwner)return;
  _adminLockOwner=false;
  try{fetch(`${FB_BASE}/locks/adminPanel.json`,{method:'DELETE'});}catch(e){}
}

async function syncPush(dbData){
  try{
    await fetch(FB_URL,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(dbData)});
  }catch(e){}
}

function fbFix(v){
  if(!v||typeof v!=='object')return v;
  const keys=Object.keys(v);
  if(keys.length&&keys.every(k=>/^\d+$/.test(k)))
    return keys.sort((a,b)=>+a-+b).map(k=>fbFix(v[k]));
  const o={};keys.forEach(k=>o[k]=fbFix(v[k]));return o;
}

async function syncPull(){
  if(syncing)return; syncing=true;
  try{
    const r=await fetch(FB_URL);
    if(!r.ok)return;
    const raw=fbFix(await r.json());
    if(!raw)return;
    // Firebase speichert leere Arrays als null → zurücksetzen
    ['users','termine','kasse','strafen','ereignisse','veranstaltungen','kategorien','regeln','sitzordnungen','changelog','halliGalliSolos','gastgeberRot','abendSieger'].forEach(f=>{
      if(!Array.isArray(raw[f]))raw[f]=raw[f]?Object.values(raw[f]):[];
    });
    const remote=raw;
    if((remote.version||0)>(DB.version||0)){
      // Änderungen erkennen bevor DB überschrieben wird
      const oldStrafIds=new Set((DB.strafen||[]).map(s=>s.id));
      const oldVotes={};
      (DB.termine||[]).forEach(t=>{ oldVotes[t.id]=JSON.stringify(t.votes||{}); });

      const tab=DB.tab;
      DB=remote; DB.tab=tab;
      localStorage.setItem(KEY,JSON.stringify(DB));
      if(document.getElementById('app')&&!document.getElementById('app').hidden) render();

      // Benachrichtigungen für neue Einträge von anderen
      if(ME){
        // Neue Strafen
        (DB.strafen||[]).filter(s=>!oldStrafIds.has(s.id)&&s.addedBy&&s.addedBy!==ME).forEach(s=>{
          notify('💸 Neue Strafe eingetragen',`${s.addedBy} hat ${s.player} eine Strafe eingetragen: ${s.grund} (${euro(s.betrag)})`);
        });
        // Neue Abstimmungen
        (DB.termine||[]).forEach(t=>{
          const newV=JSON.stringify(t.votes||{});
          if(oldVotes[t.id]!==undefined&&oldVotes[t.id]!==newV){
            const changed=Object.entries(t.votes||{}).find(([name,val])=>{
              try{return JSON.parse(oldVotes[t.id])[name]!==val&&name!==ME;}catch{return false;}
            });
            if(changed){
              const label=changed[1]==='ja'?'✓ Ja':changed[1]==='maybe'?'~ Vielleicht':'✗ Nein';
              notify('📅 Neue Abstimmung',`${changed[0]}: ${label} für ${fmtD(t.date)}`);
            }
          }
        });
      }
    }
    setSyncDot(true);
  }catch(e){setSyncDot(false);}
  finally{syncing=false;}
}

// ══ CRYPTO ═══════════════════════════════════════════════
const SALT='dk2026v4';
async function hashPw(pw){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw+SALT));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ini(n){return(n||'').trim().split(/\s+/).map(p=>p[0]||'').join('').toUpperCase().slice(0,2)||'?';}
function fmtD(d){try{return new Date(d+'T00:00:00').toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});}catch(e){return d;}}
function fmtS(d){try{return new Date(d+'T00:00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'});}catch(e){return d;}}
function euro(n){return(+n||0).toFixed(2).replace('.',',')+' €';}
function isAdmin(name){
  const u=DB.users.find(u=>u.name===name);
  if(!u)return false;
  return u.role==='admin'||u.isAdmin||false;
}
function meIsAdmin(){return isAdmin(ME);}

// area: 'termine'|'kasse'|'strafen'|'regeln'|'ereignisse'|'sitzordnung'|'veranstaltungen'
function canDo(area){
  const u=DB.users.find(u=>u.name===ME);

  const role=u.role||(u.isAdmin?'admin':'spieler');
  if(role==='admin')return true;
  if(area==='kasse'&&role==='kassenwart')return true;
  return (u.perms||[]).includes(area);
}

let aMode='login';
function initAuth(){
  document.querySelectorAll('.a-tab').forEach(t=>{
    t.onclick=()=>{
      aMode=t.dataset.at;
      document.querySelectorAll('.a-tab').forEach(x=>x.classList.toggle('on',x.dataset.at===aMode));
      document.getElementById('pw2w').style.display=aMode==='register'?'block':'none';
      document.getElementById('stay-wrap').style.display=aMode==='register'?'none':'block';
      document.getElementById('a-txt').textContent=aMode==='register'?'Registrieren':'Anmelden';
      document.getElementById('a-err').classList.remove('show');
    };
  });
  document.getElementById('pw-eye').onclick=()=>{
    const i=document.getElementById('a-pw');i.type=i.type==='password'?'text':'password';
  };
  document.getElementById('btn-a').onclick=doAuth;
  ['a-name','a-pw','a-pw2'].forEach(id=>document.getElementById(id)?.addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();}));
}
function aErr(msg){const e=document.getElementById('a-err');e.textContent=msg;e.classList.add('show');}
async function doAuth(){
  const name=document.getElementById('a-name').value.trim();
  const pw=document.getElementById('a-pw').value;
  const pw2=document.getElementById('a-pw2').value;
  const stay=document.getElementById('a-stay').checked;
  document.getElementById('a-err').classList.remove('show');
  if(!name){aErr('Bitte einen Namen eingeben.');return;}
  if(!pw)  {aErr('Bitte ein Passwort eingeben.');return;}
  const btn=document.getElementById('btn-a');
  btn.disabled=true;document.getElementById('btn-a').parentElement||btn;
  btn.classList.add('loading');  // Note: loading class on btn itself
  // quick hack: show spinner
  document.getElementById('a-spin').style.display='block';
  document.getElementById('a-txt').style.display='none';
  try{
    const hash=await hashPw(pw);
    if(aMode==='register'){
      if(pw.length<4){aErr('Passwort mind. 4 Zeichen.');return;}
      if(pw!==pw2){aErr('Passwörter stimmen nicht überein.');return;}
      // Erst aktuellen Stand von Firebase holen bevor registriert wird
      await syncPull();
      if(DB.users.find(u=>u.name.toLowerCase()===name.toLowerCase())){aErr('Name bereits vergeben.');return;}
      const isAlex=name.toLowerCase()==='alex';
      const noAdmins=!DB.users.some(u=>u.isAdmin);
      DB.users.push({name,hash,isAdmin:isAlex||noAdmins&&false});
      if(isAlex) DB.users[DB.users.length-1].isAdmin=true;
      saveDB(`${name} hat sich registriert`);ME=name;saveMe(ME,true);startApp();startPresence();
    }else{
      const u=DB.users.find(u=>u.name.toLowerCase()===name.toLowerCase()&&u.hash===hash);
      if(!u){aErr('Name oder Passwort falsch.');return;}
      // migrate: ensure Alex is always admin
      if(u.name.toLowerCase()==='alex'&&!u.isAdmin){u.isAdmin=true;saveDB();}
      ME=u.name;saveMe(ME,stay);startApp();startPresence();
    }
  }finally{
    btn.disabled=false;
    document.getElementById('a-spin').style.display='none';
    document.getElementById('a-txt').style.display='';
  }
}

function initSwipe(){
  const TABS=['termine','regeln','kasse','statistik','events','tisch'];
  let tx=0,ty=0;
  const app=document.getElementById('app');
  app.addEventListener('touchstart',e=>{
    if(document.getElementById('modal').children.length)return;
    tx=e.touches[0].clientX;
    ty=e.touches[0].clientY;
  },{passive:true});
  app.addEventListener('touchend',e=>{
    if(document.getElementById('modal').children.length)return;
    const dx=e.changedTouches[0].clientX-tx;
    const dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)<55||Math.abs(dx)<Math.abs(dy)*1.5)return;
    const idx=TABS.indexOf(DB.tab);
    const next=dx<0?idx+1:idx-1;
    if(next<0||next>=TABS.length)return;
    DB.tab=TABS[next];
    saveDB();
    render();
  },{passive:true});
}

function requestNotifPermission(){
  if(!('Notification' in window))return;
  if(Notification.permission==='default'){
    Notification.requestPermission();
  }
}

function notify(title,body){
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  if(document.visibilityState==='visible')return; // App ist offen → keine Benachrichtigung nötig
  try{new Notification(title,{body,icon:'https://aschulte96.github.io/doppelkopf-schulte/favicon.ico'});}catch(e){}
}

const TAB_ORDER=['termine','regeln','kasse','statistik','events','tisch'];
let _prevTab=null;
function render(){
  const slideDir=(()=>{
    if(!_prevTab||_prevTab===DB.tab)return null;
    const pi=TAB_ORDER.indexOf(_prevTab),ni=TAB_ORDER.indexOf(DB.tab);
    return ni>pi?'fwd':'bwd';
  })();
  _prevTab=DB.tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.tab===DB.tab));
  const fabAreaMap={termine:'termine',kasse:'kasse',regeln:'regeln',statistik:'ereignisse',events:'veranstaltungen',tisch:'sitzordnung'};
  document.getElementById('fab').hidden=!canDo(fabAreaMap[DB.tab]||'__none__');
  const c=document.getElementById('content');
  try{
    if(DB.tab==='termine')   c.innerHTML=vTermine();
    else if(DB.tab==='kasse')     c.innerHTML=vKasse();
    else if(DB.tab==='statistik') c.innerHTML=vStatistik();
    else if(DB.tab==='events')    c.innerHTML=vEvents();
    else if(DB.tab==='regeln')    c.innerHTML=vRegeln();

    else c.innerHTML=`<div class="empty"><div class="empty-i">⚠️</div><p class="empty-t">Unbekannter Tab: "${DB.tab}"</p></div>`;
  }catch(e){
    c.innerHTML=`<div style="padding:20px;color:var(--red);font-size:.8rem;word-break:break-all">
      <strong>Fehler:</strong> ${e.message}<br><br>
      Tab: ${DB.tab}<br>
      termine: ${Array.isArray(DB.termine)?DB.termine.length+' Einträge':typeof DB.termine}<br>
      users: ${Array.isArray(DB.users)?DB.users.length+' Einträge':typeof DB.users}<br>
      strafen: ${Array.isArray(DB.strafen)?DB.strafen.length+' Einträge':typeof DB.strafen}
    </div>`;
  }
  if(slideDir){
    c.classList.remove('slide-fwd','slide-bwd');
    void c.offsetWidth;
    c.classList.add('slide-'+slideDir);
  }
  bindContent();
}

function kassePrognose(){
  const kasse=DB.kasse;
  if(!kasse.length && !DB.kasseStart) return '';
  const buchBal=kasse.length?kasse[kasse.length-1].balance:0;
  const bal=(DB.kasseStart||0)+buchBal;

  // Monatliche Netto-Werte berechnen
  const monthly={};
  kasse.forEach(b=>{
    const ym=b.date.slice(0,7);
    if(!monthly[ym])monthly[ym]={ein:0,aus:0};
    if(b.type==='ein')monthly[ym].ein+=b.betrag;
    else monthly[ym].aus+=b.betrag;
  });
  const mKeys=Object.keys(monthly).sort();
  // Auch mit nur 1 Monat Daten eine Prognose zeigen
  const avgIn=mKeys.reduce((s,m)=>s+monthly[m].ein,0)/mKeys.length;
  const avgOut=mKeys.reduce((s,m)=>s+monthly[m].aus,0)/mKeys.length;
  const avgNet=avgIn-avgOut;

  // Prognose-Punkte: alle 6 Monate bis 5 Jahre
  const pts=[{m:0,v:bal}];
  for(let m=6;m<=60;m+=6) pts.push({m,v:Math.round((bal+avgNet*m)*100)/100});

  // SVG-Chart
  const vals=pts.map(p=>p.v);
  const minV=Math.min(...vals);
  const maxV=Math.max(...vals);
  const range=(maxV-minV)||1;
  const W=280,H=72,PX=6,PY=6;
  const cx=(p,i)=>PX+i*(W-2*PX)/(pts.length-1);
  const cy=v=>PY+(1-(v-minV)/range)*(H-2*PY);
  const polyPts=pts.map((p,i)=>`${cx(p,i)},${cy(p.v)}`).join(' ');
  const fillPts=`${cx(pts[0],0)},${H} ${polyPts} ${cx(pts[pts.length-1],pts.length-1)},${H}`;

  // Jahres-Labels (alle 12 Monate = 2 Punkte je Jahresschritt bei Abstand 6)
  const trend=avgNet>=0;
  const clr=trend?'var(--green)':'var(--burg-b)';

  const yearRows=[1,2,3,4,5].map(y=>{
    const v=Math.round((bal+avgNet*12*y)*100)/100;
    const diff=v-bal;
    const cls=diff>=0?'pos':'neg';
    return`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;
      border-bottom:1px solid var(--bd);font-size:.82rem">
      <span style="color:var(--t3)">+${y} Jahr${y>1?'e':''}</span>
      <span style="font-weight:700;color:var(--t1)">${v>=0?'+':''}${euro(v)}</span>
      <span class="${cls}" style="font-size:.78rem">${diff>=0?'▲':'▼'} ${euro(Math.abs(diff))}</span>
    </div>`;
  }).join('');

  return`<div style="background:var(--s2);border-radius:var(--rs);border:1px solid var(--bd);
    margin-bottom:16px;overflow:hidden">
    <div style="padding:12px 14px 6px;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:.82rem;font-weight:700;color:var(--t2)">📈 Kassenprognose</div>
      <div style="font-size:.72rem;color:var(--t3)">Basis: Ø ${mKeys.length} Monate</div>
    </div>
    <div style="padding:0 14px 4px;display:flex;gap:16px">
      <div style="font-size:.76rem;color:var(--t3)">Ø Einnahmen: <span style="color:var(--green)">${euro(avgIn)}/Mo.</span></div>
      <div style="font-size:.76rem;color:var(--t3)">Ø Ausgaben: <span style="color:var(--burg-b)">${euro(avgOut)}/Mo.</span></div>
    </div>
    <svg viewBox="0 0 ${W} ${H}" width="100%" height="72" style="display:block;overflow:visible">
      <defs>
        <linearGradient id="pg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${clr}" stop-opacity=".25"/>
          <stop offset="100%" stop-color="${clr}" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <polygon points="${fillPts}" fill="url(#pg)"/>
      <polyline points="${polyPts}" fill="none" stroke="${clr}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      ${pts.filter((_,i)=>i>0&&(i%2===0||i===pts.length-1)).map((p,_,arr)=>{
        const idx=pts.indexOf(p);
        const x=cx(p,idx);
        return`<circle cx="${x}" cy="${cy(p.v)}" r="3" fill="${clr}"/>`;
      }).join('')}
      <line x1="${cx(pts[0],0)}" y1="${PY}" x2="${cx(pts[0],0)}" y2="${H-PY}"
        stroke="var(--bd)" stroke-width="1" stroke-dasharray="3,3"/>
      <text x="${cx(pts[0],0)+3}" y="${H-2}" font-size="8" fill="var(--t3)">Jetzt</text>
      ${[2,4,6,8,10].map((idx,yi)=>{
        if(idx>=pts.length)return'';
        const x=cx(pts[idx],idx);
        return`<text x="${x}" y="${H-2}" font-size="8" fill="var(--t3)" text-anchor="middle">+${yi+1}J</text>`;
      }).join('')}
    </svg>
    <div style="padding:0 14px 12px">${yearRows}</div>
    <div style="padding:6px 14px 10px;font-size:.74rem;color:var(--t3);
      border-top:1px solid var(--bd);text-align:center">
      ${trend?'📊 Trend positiv — Kasse wächst':'⚠️ Trend negativ — Kasse schrumpft'}
      · Ø ${avgNet>=0?'+':''}${euro(avgNet)}/Monat
    </div>
  </div>`;
}

// ══ STATISTIK ════════════════════════════════════════════
function computeStats(){
  const s={solos:{},fehlwurf:{},hochzeit:{},pflichtsolo:{},strafen:{}};
  DB.users.forEach(u=>{
    s.solos[u.name]=0;s.fehlwurf[u.name]=0;
    s.hochzeit[u.name]=0;s.pflichtsolo[u.name]=0;s.strafen[u.name]=0;
  });
  DB.ereignisse.forEach(e=>{
    if(e.type==='solo')        s.solos[e.player]=(s.solos[e.player]||0)+1;
    if(e.type==='fehlwurf')    s.fehlwurf[e.player]=(s.fehlwurf[e.player]||0)+1;
    if(e.type==='hochzeit')    s.hochzeit[e.player]=(s.hochzeit[e.player]||0)+1;
    if(e.type==='pflichtsolo'&&e.won) s.pflichtsolo[e.player]=(s.pflichtsolo[e.player]||0)+1;
  });
  DB.strafen.forEach(e=>{s.strafen[e.player]=(s.strafen[e.player]||0)+e.betrag;});
  return s;
}

function lboard(data,icon,label,fmtFn,valCls=''){
  const sorted=Object.entries(data).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const inner=sorted.length
    ?sorted.slice(0,5).map(([name,val],i)=>`
      <div class="stat-row">
        <span class="stat-med">${['🥇','🥈','🥉'][i]||i+1+'.'}</span>
        <span class="stat-nm">${esc(name)}</span>
        <span class="stat-val ${valCls}">${fmtFn(val)}</span>
      </div>`).join('')
    :`<div class="stat-empty">Noch keine Einträge</div>`;
  return`<div class="stat-card">
    <div class="stat-head">${icon} ${esc(label)}</div>${inner}</div>`;
}

function vPairingStats(){
  const pairs=computePairings();
  const sorted=Object.entries(pairs).sort((a,b)=>b[1]-a[1]);
  if(!sorted.length) return`<div class="stat-card wide">
    <div class="stat-head">🤝 Tisch-Partner</div>
    <div class="stat-empty">Noch keine Sitzordnungen gespeichert.<br>Würfle eine Sitzordnung und speichere sie.</div>
  </div>`;
  const rows=sorted.map(([key,count],i)=>{
    const [a,b]=key.split('|||');
    const bar=Math.round((count/sorted[0][1])*100);
    return`<div class="stat-row" style="flex-direction:column;align-items:stretch;gap:4px;padding:9px 13px">
      <div style="display:flex;align-items:center;gap:9px">

        <span class="stat-val">${count}×</span>
      </div>
      <div style="height:4px;border-radius:2px;background:var(--s3);overflow:hidden;margin-left:31px">
        <div style="height:100%;width:${bar}%;background:var(--gold);border-radius:2px;transition:width .4s"></div>
      </div>
    </div>`;
  }).join('');
  const total=DB.sitzordnungen.length;
  return`<div class="stat-card wide">
    <div class="stat-head">🤝 Tisch-Partner <span style="font-weight:400;color:var(--t3);font-size:.72rem;margin-left:6px">${total} Abend${total!==1?'e':''} gespeichert</span></div>

function vRegeln(){
  const adm=canDo('regeln');
  const g={};
  DB.regeln.forEach(r=>{(g[r.kat]||(g[r.kat]=[])).push(r);});
  const defined=DB.kategorien.map(k=>k.name);
  const orphans=Object.keys(g).filter(k=>!defined.includes(k));

  const sections=allKats.map(kat=>{

    const ruleRows=rows.map(r=>`

      <div class="rg-grp-head">

      </div>

    </div>`;

    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

  document.getElementById('mc').onclick=closeM;
}

function exportDB(){
  const json=JSON.stringify(DB,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`dk-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importDB(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='.json,application/json';
  input.onchange=e=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!Array.isArray(data.users)||!Array.isArray(data.termine))
          throw new Error('Keine gültige Backup-Datei.');
        if(!confirm(`Backup laden und aktuelle Daten ersetzen?\n\n${data.users.length} Spieler, ${data.termine.length} Termine`))return;
        data.version=(data.version||0)+1;
        DB=data;
        try{localStorage.setItem(KEY,JSON.stringify(DB));}catch(e){}
        syncPush(DB);
        render();
        closeM();
      }catch(err){alert('Fehler: '+err.message);}
    };
    reader.readAsText(file);
  };
  input.click();
}

    </div>
  </div>`);
  document.getElementById('mc').onclick=closeM;
  document.getElementById('ms').onclick=()=>{
    const name=document.getElementById('m-katname').value.trim();
    if(!name){alert('Name eingeben.');return;}
    if(isEdit){

      DB.regeln.forEach(r=>{if(r.kat===katName)r.kat=name;});

    </div>

    <details style="margin-top:16px;background:var(--s2);border-radius:var(--rs);border:1px solid var(--bd)">

    btn.onclick=()=>mResetPw(btn.dataset.resetUser);
  });

function mRenameUser(oldName){
  openM(`<div class="sheet"><div class="s-drag"></div>
    <div class="s-title">✎ Spieler umbenennen</div>
    <div style="font-size:.82rem;color:var(--t2);text-align:center;margin-bottom:16px">
      Neuer Name für <strong style="color:var(--t1)">${esc(oldName)}</strong><br>
      <span style="font-size:.74rem;color:var(--t3)">Alle Einträge werden automatisch aktualisiert.</span>
    </div>
    <div class="sf"><label>Neuer Name</label>
      <input type="text" id="m-newname" value="${esc(oldName)}" autocomplete="off"/>
    </div>
    <div class="sa">
      <button class="s-cancel" id="mc">Abbrechen</button>
      <button class="s-save" id="ms">Umbenennen ✓</button>
    </div>
  </div>`);
  document.getElementById('mc').onclick=closeM;
  const inp=document.getElementById('m-newname');
  inp.select();
  document.getElementById('ms').onclick=()=>{
    const newName=inp.value.trim();
    if(!newName){alert('Name darf nicht leer sein.');return;}
    if(newName===oldName){closeM();return;}
    if(DB.users.some(u=>u.name.toLowerCase()===newName.toLowerCase())){
      alert('Dieser Name ist bereits vergeben.');return;
    }
    // Alle verknüpften Felder aktualisieren
    const u=DB.users.find(u=>u.name===oldName);
    if(u) u.name=newName;
    DB.strafen.forEach(s=>{if(s.player===oldName)s.player=newName;if(s.addedBy===oldName)s.addedBy=newName;});
    DB.ereignisse.forEach(e=>{if(e.player===oldName)e.player=newName;if(e.addedBy===oldName)e.addedBy=newName;});
    DB.kasse.forEach(b=>{if(b.addedBy===oldName)b.addedBy=newName;});
    DB.termine.forEach(t=>{
      if(t.addedBy===oldName)t.addedBy=newName;
      if(t.votes&&t.votes[oldName]!==undefined){
        t.votes[newName]=t.votes[oldName];
        delete t.votes[oldName];
      }
    });
    DB.veranstaltungen.forEach(v=>{if(v.addedBy===oldName)v.addedBy=newName;});
    DB.sitzordnungen.forEach(s=>{
      if(s.savedBy===oldName)s.savedBy=newName;
      s.seats=s.seats.map(n=>n===oldName?newName:n);
    });
    (DB.halliGalliSolos||[]).forEach(s=>{if(s.player===oldName)s.player=newName;});
    (DB.changelog||[]).forEach(c=>{if(c.user===oldName)c.user=newName;});
    if(ME===oldName){ME=newName;saveMe(newName,true);}
    saveDB(`${oldName} umbenannt zu ${newName}`);
    closeM();
    openAdminPanel();
  };
}

function mResetPw(name){
  openM(`<div class="sheet"><div class="s-drag"></div>
    <div class="s-title">🔑 Passwort zurücksetzen</div>
    <div style="font-size:.78rem;color:var(--t3);text-align:center;margin-bottom:16px">Neues Passwort für <strong style="color:var(--t1)">${esc(name)}</strong></div>
    <div class="sf"><label>Neues Passwort</label><input type="text" id="m-newpw" placeholder="Mindestens 4 Zeichen" autocomplete="off"/></div>
    <div class="sa"><button class="s-cancel" id="mc">Abbrechen</button>
      <button class="s-save" id="ms">Zurücksetzen ✓</button>
    </div>
  </div>`);
  document.getElementById('mc').onclick=closeM;
  document.getElementById('ms').onclick=async()=>{
    const pw=document.getElementById('m-newpw').value;
    if(pw.length<4){alert('Mindestens 4 Zeichen.');return;}
    const hash=await hashPw(pw);
    const u=DB.users.find(x=>x.name===name);
    if(u){u.hash=hash;saveDB();}
    closeM();
    openAdminPanel();
  };
}

// ══ BIND ══════════════════════════════════════════════════
function bindContent(){
  document.querySelectorAll('.tab').forEach(t=>{
    t.onclick=()=>{DB.tab=t.dataset.tab;saveDB();render();};
  });
  document.getElementById('fab').onclick=()=>{
    if(DB.tab==='termine')   mTermin();
    if(DB.tab==='kasse')     mBuchung();
    if(DB.tab==='statistik') mEreignis();
    if(DB.tab==='events')    mEvent();
    if(DB.tab==='tisch')     mSitzordnung();
    if(DB.tab==='regeln')    mRegel(null, DB.kategorien[0]?.name);
  };
  document.querySelectorAll('[data-vote]').forEach(b=>{
    b.onclick=()=>{
      const t=DB.termine.find(x=>x.id===+b.dataset.tid);
      if(!t)return;
      t.votes=t.votes||{};
      if(t.votes[ME]===b.dataset.vote) delete t.votes[ME]; else t.votes[ME]=b.dataset.vote;
      saveDB();render();
    };
  });
  document.querySelectorAll('[data-straf-player]').forEach(b=>{
    b.onclick=()=>mStrafe(b.dataset.strafPlayer);
  });
  document.getElementById('btn-sitz')?.addEventListener('click',mSitzordnung);
  document.querySelectorAll('[data-del-sitz]').forEach(b=>{
    b.onclick=()=>{
      DB.sitzordnungen=DB.sitzordnungen.filter(x=>x.id!==+b.dataset.delSitz);
      const tod=new Date().toISOString().slice(0,10);
      if(!DB.sitzordnungen.some(s=>s.date===tod&&(s.phase||0)===2))
        DB.halliGalliSolos=[];
      saveDB();render();
    };
  });
  document.getElementById('btn-buch')?.addEventListener('click',mBuchung);
  document.getElementById('btn-wa')?.addEventListener('click',waExportKasse);
  document.querySelectorAll('[data-edit-buch]').forEach(b=>{
    b.onclick=()=>{const buch=DB.kasse.find(x=>x.id===+b.dataset.editBuch);if(buch)mBuchungEdit(buch);};
  });
  document.querySelectorAll('[data-del-buch]').forEach(b=>{
    b.onclick=()=>{DB.kasse=DB.kasse.filter(x=>x.id!==+b.dataset.delBuch);recalcBalances();saveDB();render();};
  });
  document.getElementById('btn-add-kat')?.addEventListener('click',()=>mKategorie(null));
  document.querySelectorAll('[data-toggle-straf]').forEach(b=>{
    b.onclick=e=>{
      e.stopPropagation();
      const name=b.dataset.toggleStraf;
      strafExpanded.has(name)?strafExpanded.delete(name):strafExpanded.add(name);
      render();
    };
  });
  document.querySelectorAll('[data-del-strafe]').forEach(b=>{
    b.onclick=()=>{
      const s=DB.strafen.find(x=>x.id===+b.dataset.delStrafe);
      if(!s)return;
      DB.strafen=DB.strafen.filter(x=>x.id!==s.id);
      // passenden Kasseneintrag entfernen
      DB.kasse=DB.kasse.filter(k=>!(k.type==='ein'&&k.betrag===s.betrag&&k.desc&&k.desc.startsWith(`Strafe: ${s.player}`)));
      recalcBalances();saveDB();render();
    };
  });
  document.querySelectorAll('[data-del-ereignis]').forEach(b=>{
    b.onclick=()=>{DB.ereignisse=DB.ereignisse.filter(e=>e.id!==+b.dataset.delEreignis);saveDB();render();};
  });
  document.querySelectorAll('[data-edit-regel]').forEach(b=>{
    b.onclick=()=>{const r=DB.regeln.find(x=>x.id===+b.dataset.editRegel);if(r)mRegel(r);};
  });
  document.querySelectorAll('[data-del-regel]').forEach(b=>{
    b.onclick=()=>{DB.regeln=DB.regeln.filter(x=>x.id!==+b.dataset.delRegel);saveDB();render();};
  });

    b.onclick=()=>mKategorie(b.dataset.editKat);
  });
  document.querySelectorAll('[data-add-regel-kat]').forEach(b=>{
    b.onclick=()=>mRegel(null, b.dataset.addRegelKat);
  });
  document.querySelectorAll('[data-edit-termin]').forEach(b=>{
    b.onclick=()=>{const t=DB.termine.find(x=>x.id===+b.dataset.editTermin);if(t)mTermin(t);};

// ══ SITZORDNUNG ═══════════════════════════════════════════
function mSitzordnung(){
  const today=new Date().toISOString().slice(0,10);
  const naechster=[...DB.termine].filter(t=>t.date>=today).sort((a,b)=>a.date<b.date?-1:1)[0];

  let players, terminInfo='', terminId=null;
  if(naechster){
    const v=naechster.votes||{};
    const ja=DB.users.filter(u=>v[u.name]==='ja').map(u=>u.name);
    const maybe=DB.users.filter(u=>v[u.name]==='maybe').map(u=>u.name);
    players=ja.length>=2?ja:[...ja,...maybe];
    terminId=naechster.id;
    terminInfo=`<div style="font-size:.75rem;color:var(--t2);text-align:center;margin-bottom:14px;padding:8px 12px;background:var(--s3);border-radius:var(--rs)">
      📅 ${esc(fmtD(naechster.date))}<br>
      <span style="color:var(--t3)">${players.length} Zusagen${ja.length<2&&maybe.length?` (inkl. Vielleicht)`:''}
      ${players.length===0?'<br><span style="color:var(--yel)">⚠ Noch keine Zusagen — alle Spieler werden verwendet</span>':''}</span>
    </div>`;
    if(players.length<2) players=DB.users.map(u=>u.name);
  }else{
    players=DB.users.map(u=>u.name);
    terminInfo=`<div style="font-size:.75rem;color:var(--t3);text-align:center;margin-bottom:14px">Kein Termin gefunden — alle Spieler</div>`;
  }

  if(players.length<2){
    openM(`<div class="sheet"><div class="s-drag"></div>
      <div class="s-title">🎲 Sitzordnung</div>
      ${terminInfo}
      <div style="text-align:center;padding:20px 10px">
        <div style="font-size:2rem;margin-bottom:10px">👤</div>
        <div style="font-size:.9rem;color:var(--t2);line-height:1.6">
          Noch zu wenige Zusagen für eine Sitzordnung.<br>
          <span style="color:var(--t3);font-size:.8rem">Mindestens 2 Spieler müssen mit <strong style="color:var(--green)">Ja</strong> abstimmen.</span>
        </div>
      </div>
      <button class="s-cancel" id="mc" style="width:100%;margin-top:8px">Schließen</button>
    </div>`);
    document.getElementById('mc').onclick=closeM;
    return;
  }

  function shuffle(arr){
    const a=[...arr];
    for(let i=a.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  function renderTable(group,tableNum,rolling,compact){
    const seat=(n)=>`<div class="dk-seat${rolling?' rolling':' filled'}">
      <div class="dk-seat-av">${rolling?'?':esc(ini(n))}</div>
      <div class="dk-seat-nm">${rolling?'…':esc(n)}</div>
    </div>`;
    const north=[],east=[],south=[],west=[];
    const sides=[north,east,south,west];
    group.forEach((n,i)=>sides[i%4].push(n));
    return`<div class="dk-scene${compact?' compact':''}">
      <div class="dk-row">${north.map(seat).join('')}</div>
      <div class="dk-middle">
        <div class="dk-side">${west.map(seat).join('')}</div>
        <div class="dk-felt${rolling?' rolling':''}">
          <div class="dk-felt-num">Tisch ${tableNum}</div>
          <div class="dk-felt-icon">🃏</div>
        </div>
        <div class="dk-side">${east.map(seat).join('')}</div>
      </div>
      <div class="dk-row">${south.map(seat).join('')}</div>
    </div>`;
  }

  function slots(names,rolling){
    const half=Math.ceil(names.length/2);
    const tables=[names.slice(0,half),names.slice(half)];
    return`<div class="dk-tables">${tables.map((g,t)=>renderTable(g,t+1,rolling,false)).join('')}</div>`;
  }

  let currentOrder=shuffle(players);
  let rollTimer=null;

  openM(`<div class="sheet"><div class="s-drag"></div>
    <div class="s-title">🎲 Sitzordnung</div>
    ${terminInfo}
    <div id="tisch-grid">${slots(currentOrder,true)}</div>
    <div style="font-size:.72rem;color:var(--t3);text-align:center;margin-top:4px;margin-bottom:12px" id="sitz-hint">Würfelt…</div>
    <div class="sa">
      <button class="s-cancel" id="mc">Schließen</button>
      <button class="s-save" id="ms-neu">Neu würfeln 🎲</button>
    </div>
    <button class="btn-outline" id="ms-save" style="margin-top:8px;display:none">
      💾 Diese Sitzordnung speichern
    </button>
  </div>`);
  document.getElementById('mc').onclick=closeM;

  function roll(){
    if(rollTimer){clearInterval(rollTimer);rollTimer=null;}
    const grid=document.getElementById('tisch-grid');
    const hint=document.getElementById('sitz-hint');
    const saveBtn=document.getElementById('ms-save');
    if(!grid)return;
    if(saveBtn) saveBtn.style.display='none';
    if(hint) hint.textContent='Würfelt…';
    let frame=0;
    rollTimer=setInterval(()=>{
      const tmp=shuffle(players);
      grid.innerHTML=slots(tmp,true);
      if(++frame>=18){
        clearInterval(rollTimer);rollTimer=null;
        currentOrder=shuffle(players);
        grid.innerHTML=slots(currentOrder,false);
        if(hint) hint.textContent='Sitzordnung für heute Abend';
        if(saveBtn) saveBtn.style.display='flex';
      }
    },80);
  }

  roll();
  document.getElementById('ms-neu').onclick=roll;
  document.getElementById('ms-save').onclick=()=>{
    const phase=DB.tischPhase||0;
    DB.sitzordnungen.push({
      id:DB.nextId++,
      date:new Date().toISOString().slice(0,10),
      seats:currentOrder,
      savedBy:ME,
      phase
    });
    if(phase===2){
      DB.halliGalliSolos=currentOrder.map(p=>({player:p,soloType:null,done:false}));
    }
    saveDB(`Sitzordnung ${PHASEN[phase].label} gespeichert`);
    document.getElementById('sitz-hint').textContent='✅ Gespeichert!';
    document.getElementById('ms-save').style.display='none';
    render();
  };
}

function computePairings(){
  const counts={};
  DB.sitzordnungen.forEach(s=>{
    const seats=s.seats||[];
    for(let i=0;i<seats.length;i++){
      for(let j=i+1;j<seats.length;j++){
        const key=[seats[i],seats[j]].sort().join('|||');
        counts[key]=(counts[key]||0)+1;
      }
    }
  });
  return counts;
}

// ── Service Worker + Spieltag-Erinnerung ──────────────────
async function planSpieltag(){
  if(!('Notification' in window)||Notification.permission!=='granted') return;
  if(!('serviceWorker' in navigator)) return;
  const reg=await navigator.serviceWorker.ready.catch(()=>null);
  if(!reg) return;
  const today=new Date().toISOString().slice(0,10);
  const termin=DB.termine.find(t=>t.date===today);
  if(!termin) return;
  const [h,m]=(termin.time||'19:00').split(':').map(Number);
  const fire=new Date();
  fire.setHours(h-1,m,0,0);
  const ms=fire-new Date();
  if(ms<0) return;
  reg.active?.postMessage({
    type:'PLAN_REMINDER',
    ms,
    title:'🃏 Spielabend heute!',
    body:`Um ${termin.time} Uhr geht es los — bist du dabei?`
  });
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/doppelkopf-schulte/sw.js').then(()=>{
    planSpieltag();
  }).catch(()=>{});
}

function waExportKasse(){
  const bal=DB.kasse.length?DB.kasse[DB.kasse.length-1].balance:0;
  const totals={};
  DB.users.forEach(u=>{totals[u.name]=0;});
  DB.strafen.forEach(s=>{totals[s.player]=(totals[s.player]||0)+s.betrag;});
  const strafLines=DB.users.filter(u=>(totals[u.name]||0)>0)
    .sort((a,b)=>(totals[b.name]||0)-(totals[a.name]||0))
    .map(u=>`  • ${u.name}: ${euro(totals[u.name])}`).join('\n');
  const naechster=[...DB.termine].filter(t=>t.date>=new Date().toISOString().slice(0,10))
    .sort((a,b)=>a.date<b.date?-1:1)[0];
  const lines=[
    '♣ *DoppelKopf Schulte* ♠','',
    `💰 *Kassenstand:* ${bal>=0?'+':''}${euro(bal)}`,
  ];
  if(strafLines) lines.push('','💸 *Strafenkasse:*',strafLines);
  if(naechster) lines.push('',`📅 *Nächster Termin:*`,`  ${fmtD(naechster.date)}, ${naechster.time} Uhr`,`  📍 ${naechster.ort}`);
  lines.push('',`Stand: ${new Date().toLocaleDateString('de-DE')}`);
  const text=lines.join('\n');
  navigator.clipboard.writeText(text).then(()=>{
    alert('✅ In Zwischenablage kopiert!\nJetzt in WhatsApp einfügen.');
  }).catch(()=>alert(text));
}
